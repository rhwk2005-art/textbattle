<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 텍스트 배틀 게임</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { background: radial-gradient(circle at 15% 50%, #1a1a2e, #0f0f1a, #050505); color: #f1f5f9; font-family: 'Pretendard', sans-serif; max-width: 850px; margin: 0 auto; padding: 50px 20px; line-height: 1.6; }
        h1, h2 { text-align: center; background: linear-gradient(135deg, #a855f7, #ec4899, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; letter-spacing: -1px; margin-bottom: 30px; }
        #authSection, #gameSection > form, #battleArena { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-radius: 24px; padding: 40px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2); margin-bottom: 30px; }
        input[type="text"], input[type="email"], input[type="password"] { width: 100%; padding: 16px; margin: 8px 0 24px; background-color: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.1); color: white; border-radius: 12px; font-size: 16px; outline: none; transition: border 0.3s ease; }
        input:focus { border-color: #ec4899; }
        button { width: 100%; padding: 16px; margin-bottom: 12px; font-size: 18px; font-weight: 700; background: linear-gradient(135deg, #ec4899, #ef4444); color: white; border: none; border-radius: 12px; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        button:hover { transform: translateY(-4px); box-shadow: 0 10px 25px rgba(236, 72, 153, 0.4); }
        .secondary-btn { background: rgba(255, 255, 255, 0.1); box-shadow: none; }
        .secondary-btn:hover { background: rgba(255, 255, 255, 0.2); box-shadow: none; }
        #characterList { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 20px; }
        .char-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); padding: 24px; border-radius: 20px; text-align: center; backdrop-filter: blur(10px); transition: all 0.3s ease; }
        .char-card:hover { transform: translateY(-8px); border-color: #a855f7; background: rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>

    <div id="authSection">
        <h1>입장소 (로그인)</h1>
        <p style="text-align: center; color: #ccc;">전장에 참여하려면 신분을 증명하십시오.</p>
        <input type="email" id="emailInput" placeholder="이메일 주소">
        <input type="password" id="passwordInput" placeholder="비밀번호 (6자리 이상)">
        <button onclick="handleLogin()">🚀 로그인</button>
        <button class="secondary-btn" onclick="handleSignup()">📝 새로 가입하기</button>
        <div id="authMessage" style="color: #ff4757; text-align: center; margin-top: 10px;"></div>
    </div>

    <div id="gameSection" style="display: none;">
        <div style="background: linear-gradient(135deg, rgba(236, 72, 153, 0.1), rgba(168, 85, 247, 0.1)); padding: 30px; border-radius: 20px; border: 1px solid rgba(236, 72, 153, 0.3); margin-top: 20px; margin-bottom: 40px;">
            <h2 style="margin-top: 0; color: #f1f5f9; text-shadow: 0 0 10px rgba(236, 72, 153, 0.5);">🏆 명예의 전당 (Top 3)</h2>
            <div id="hallOfFame" style="display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;">
                </div>
        </div>
        <div style="text-align: right;">
            <span id="currentUserEmail" style="color: #aaa; margin-right: 15px;"></span>
            <button class="secondary-btn" onclick="handleLogout()" style="width: auto; padding: 8px 15px; font-size: 14px;">로그아웃</button>
        </div>
        <h1>⚔️ 나만의 전사 만들기</h1>
        <form action="/battle" method="POST">
            <input type="hidden" id="ownerIdInput" name="ownerId">
            <label>캐릭터 이름</label>
            <input type="text" name="playerName" required placeholder="예: 어둠의 암살자">
            <label>특수 능력</label>
            <input type="text" name="ability" required placeholder="예: 그림자 속에 숨어 치명타를 가함">
            <button type="submit">전사 등록하기</button>
        </form>
        <hr style="border-color: #333; margin: 40px 0;">
        <h2>⚔️ 랜덤 텍스트 배틀</h2>
        <button onclick="startRandomBattle()">🔥 랜덤 배틀 시작! 🔥</button>
        <div id="battleArena">결과가 이곳에 표시됩니다.</div>
        <hr style="border-color: #333; margin: 40px 0;">
        <h2>🏆 현재 등록된 참전 용사들</h2>
        <div id="characterList">데이터를 불러오는 중...</div>
    </div>

    <script>
        const supabaseUrl = 'https://cjtshlrvuhhjmrlksohi.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqdHNobHJ2dWhoam1ybGtzb2hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MTc3MzEsImV4cCI6MjA4ODA5MzczMX0.ANiPuMSvCW7C8ybJNXU1BhpG1tO18VKGYbxXUrfWVKM'; 
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        const authSection = document.getElementById('authSection');
        const gameSection = document.getElementById('gameSection');
        const authMessage = document.getElementById('authMessage');

        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (session) {
                authSection.style.display = 'none';
                gameSection.style.display = 'block';
                document.getElementById('currentUserEmail').innerText = '접속자: ' + session.user.email;
                document.getElementById('ownerIdInput').value = session.user.id;
                loadCharacters();
            } else {
                authSection.style.display = 'block';
                gameSection.style.display = 'none';
            }
        });

        async function handleSignup() {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            const { data, error } = await supabaseClient.auth.signUp({ email, password });
            if (error) authMessage.innerText = '가입 에러: ' + error.message;
            else authMessage.innerText = '가입 성공! 이제 로그인 버튼을 눌러주세요.';
        }

        async function handleLogin() {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) authMessage.innerText = '로그인 실패. 아이디나 비밀번호를 확인하세요.';
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
        }

        // 무작위 배틀 시작 (타이핑 애니메이션 효과)
        async function startRandomBattle() {
            const arena = document.getElementById('battleArena');
            arena.style.display = 'block';
            
            // 로딩 메시지도 트렌디하게 변경!
            arena.innerHTML = '<h3 style="color: #a855f7; text-align: center;">⏳ 차원의 문을 여는 중... AI 심판이 판정을 준비하고 있습니다!</h3>';

            try {
                const response = await fetch('/api/battle/random');
                if (!response.ok) {
                    const errorText = await response.text();
                    arena.innerHTML = `<h3 style="color:#ef4444;">❌ ${errorText}</h3>`;
                    return;
                }
                
                const result = await response.json();
                
                // 1. 배틀 결과창의 뼈대(제목과 글자가 찍힐 빈 박스)를 먼저 화면에 그립니다.
                arena.innerHTML = `
                    <h2 style="text-align: center; background: linear-gradient(135deg, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px;">
                        ⚔️ ${result.playerA} VS ${result.playerB} ⚔️
                    </h2>
                    <div id="storyBox" style="font-size: 16px; line-height: 1.8; background: rgba(0, 0, 0, 0.3); padding: 25px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); min-height: 150px;"></div>
                `;

                // 2. 글자가 찍힐 빈 공간(storyBox)과 전체 소설(fullText)을 준비합니다.
                const storyBox = document.getElementById('storyBox');
                const fullText = result.story;
                let currentLetterIndex = 0; // 현재 몇 번째 글자를 찍고 있는지 기억하는 숫자

                // 3. 타이핑 애니메이션 마법 (재귀 함수)
                function typeNextLetter() {
                    if (currentLetterIndex < fullText.length) {
                        // 엔터키(\n)를 만나면 웹용 줄바꿈(<br>)으로 바꿔주고, 아니면 글자를 그대로 출력
                        const char = fullText.charAt(currentLetterIndex);
                        storyBox.innerHTML += (char === '\n') ? '<br>' : char;
                        
                        currentLetterIndex++;
                        
                        // 0.02초(20ms) 뒤에 다음 글자를 찍으라고 예약 (이 숫자를 조절해 속도 변경 가능!)
                        setTimeout(typeNextLetter, 5); 
                    } else {
                        // 🟢 하이라이트: 소설 타이핑이 끝나는 순간, 명부와 랭킹을 새로고침! (극적인 점수 반영)
                        loadCharacters();
                    }
                }

                // 타이핑 마법 시작!
                typeNextLetter();

            } catch (error) {
                arena.innerHTML = '<h3 style="color:#ef4444;">통신 오류가 발생했습니다.</h3>';
            }
        }

        // 🟢 [최종 통합본] 캐릭터 명부 및 명예의 전당 불러오기
        async function loadCharacters() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            const myId = session ? session.user.id : null;

            const response = await fetch('/api/characters');
            const characters = await response.json();
            
            // ==========================================
            // 1. 명예의 전당 (Top 3) 계산 및 그리기
            // ==========================================
            const top3Characters = [...characters]
                .sort((a, b) => (b.wins || 0) - (a.wins || 0))
                .slice(0, 3);

            const medals = ['🥇 1위', '🥈 2위', '🥉 3위'];
            const hallOfFameDiv = document.getElementById('hallOfFame');
            hallOfFameDiv.innerHTML = ''; 

            let hasWinner = false;

            top3Characters.forEach((char, index) => {
                if ((char.wins || 0) === 0) return; 
                
                hasWinner = true; 
                const winRate = char.matches > 0 ? Math.round((char.wins / char.matches) * 100) : 0;
                
                hallOfFameDiv.innerHTML += `
                    <div style="background: rgba(0, 0, 0, 0.4); border: 1px solid ${index === 0 ? '#fbbf24' : 'rgba(255,255,255,0.1)'}; padding: 20px; border-radius: 15px; text-align: center; flex: 1; min-width: 150px; transform: ${index === 0 ? 'scale(1.05)' : 'scale(1)'};">
                        <div style="font-size: 24px; margin-bottom: 10px;">${medals[index]}</div>
                        <h3 style="color: #f1f5f9; margin: 0 0 10px 0;">${char.player_name}</h3>
                        <div style="color: #ec4899; font-weight: bold; font-size: 18px;">${char.wins}승</div>
                        <div style="color: #94a3b8; font-size: 14px; margin-top: 5px;">승률 ${winRate}%</div>
                    </div>
                `;
            });

            // 1승 이상 한 사람이 없을 때 띄워주는 안내 문구
            if (!hasWinner) {
                hallOfFameDiv.innerHTML = '<div style="color: #94a3b8; text-align: center; width: 100%; padding: 20px;">아직 1승을 달성한 전사가 없습니다. 첫 배틀을 시작하세요!</div>';
            }

            // ==========================================
            // 2. 전체 캐릭터 명부(카드) 그리기
            // ==========================================
            const listDiv = document.getElementById('characterList');
            listDiv.innerHTML = '';

            characters.forEach(char => {
                let deleteBtn = '';
                let displayAbility = '<span style="color: #ec4899;">??? (비공개)</span>';

                const matches = char.matches || 0;
                const wins = char.wins || 0;
                const winRate = matches > 0 ? Math.round((wins / matches) * 100) : 0;

                // (index.html 내 loadCharacters 함수 안쪽 부분)
                if (myId === char.owner_id) {
                    displayAbility = char.ability;
                    // 🟢 기존 은퇴 버튼 위에 [출전 버튼]을 화려하게 추가합니다!
                    deleteBtn = `
                        <button onclick="startChallenge(${char.id})" style="background:linear-gradient(135deg, #3b82f6, #8b5cf6); padding:12px; font-size:16px; margin-top:15px; width:100%; border-radius:8px; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);">⚔️ 이 전사로 출전하기</button>
                        <button onclick="deleteCharacter(${char.id})" style="background:rgba(255,255,255,0.1); padding:10px; font-size:14px; margin-top:8px; width:100%; box-shadow:none;">🗑️ 내 전사 은퇴시키기</button>
                    `;
                }

                const charCard = `
                    <div class="char-card">
                        <h3 style="color:#f1f5f9; margin-top:0; font-size:22px;">👤 ${char.player_name}</h3>
                        
                        <div style="background: rgba(0, 0, 0, 0.3); border-radius: 8px; padding: 12px; margin: 15px 0; font-size: 15px;">
                            <span style="color: #cbd5e1;">⚔️ ${matches}전 ${wins}승</span> 
                            <strong style="color: #ec4899; margin-left: 10px;">🏆 승률 ${winRate}%</strong>
                        </div>

                        <p style="font-size:14px; color:#94a3b8; line-height:1.4;"><strong>능력:</strong><br>${displayAbility}</p>
                        ${deleteBtn}
                    </div>
                `;
                listDiv.innerHTML += charCard;
            });
        }

        // 🟢 삭제 기능은 반드시 loadCharacters 바깥에 독립적으로 있어야 합니다!
        async function deleteCharacter(charId) {
            if (!confirm("정말 이 전사를 은퇴시키겠습니까? 복구할 수 없습니다!")) return;
            await fetch(`/api/characters/${charId}`, { method: 'DELETE' });
            loadCharacters(); 
        }

        // 🟢 [새로 추가] 내 캐릭터를 직접 출전시키는 함수
        async function startChallenge(charId) {
            const arena = document.getElementById('battleArena');
            arena.style.display = 'block';
            
            // 전장으로 화면을 부드럽게 스크롤해주는 센스있는 기능
            arena.scrollIntoView({ behavior: 'smooth', block: 'start' });
            
            arena.innerHTML = '<h3 style="color: #3b82f6; text-align: center;">🚀 전장으로 이동 중... 맞붙을 상대를 탐색하고 있습니다!</h3>';

            try {
                // 방금 백엔드에 만든 지정 배틀 주소로 요청을 보냅니다.
                const response = await fetch(`/api/battle/challenge/${charId}`);
                if (!response.ok) {
                    const errorText = await response.text();
                    arena.innerHTML = `<h3 style="color:#ef4444;">❌ ${errorText}</h3>`;
                    return;
                }
                
                const result = await response.json();
                
                // 파란색 톤의 제목으로 '내가 선택한 배틀'임을 강조합니다.
                arena.innerHTML = `
                    <h2 style="text-align: center; background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px;">
                        ⚔️ ${result.playerA}(나) VS ${result.playerB}(적) ⚔️
                    </h2>
                    <div id="storyBox" style="font-size: 16px; line-height: 1.8; background: rgba(0, 0, 0, 0.3); padding: 25px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); min-height: 150px;"></div>
                `;

                const storyBox = document.getElementById('storyBox');
                const fullText = result.story;
                let currentLetterIndex = 0;

                function typeNextLetter() {
                    if (currentLetterIndex < fullText.length) {
                        const char = fullText.charAt(currentLetterIndex);
                        storyBox.innerHTML += (char === '\n') ? '<br>' : char;
                        currentLetterIndex++;
                        setTimeout(typeNextLetter, 20); 
                    } else {
                        loadCharacters(); // 배틀 종료 시 전적 새로고침
                    }
                }
                typeNextLetter();

            } catch (error) {
                arena.innerHTML = '<h3 style="color:#ef4444;">통신 오류가 발생했습니다.</h3>';
            }
        }
    </script>
</body>
</html>
