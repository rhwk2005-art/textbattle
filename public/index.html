<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 텍스트 배틀: 전설의 서막</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        /* 전체 테마: 다크 판타지 */
        body { background: radial-gradient(circle at 15% 50%, #1a1a2e, #0f0f1a, #050505); color: #f1f5f9; font-family: 'Pretendard', sans-serif; max-width: 850px; margin: 0 auto; padding: 50px 20px; line-height: 1.6; }
        h1, h2 { text-align: center; background: linear-gradient(135deg, #a855f7, #ec4899, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; letter-spacing: -1px; margin-bottom: 30px; }
        
        /* 섹션 스타일링 */
        #authSection, #battleArena, #gameSection { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(16px); border-radius: 24px; padding: 40px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2); margin-bottom: 30px; }
        
        input { width: 100%; padding: 16px; margin: 8px 0 24px; background-color: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.1); color: white; border-radius: 12px; font-size: 16px; outline: none; box-sizing: border-box; }
        button { width: 100%; padding: 16px; margin-bottom: 12px; font-size: 18px; font-weight: 700; background: linear-gradient(135deg, #ec4899, #ef4444); color: white; border: none; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        button:hover { transform: translateY(-4px); box-shadow: 0 10px 25px rgba(236, 72, 153, 0.4); }
        .secondary-btn { background: rgba(255, 255, 255, 0.1); box-shadow: none; }
        
        /* 캐릭터 카드 그리드 */
        #characterList { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-top: 20px; }
        .char-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); padding: 20px; border-radius: 20px; text-align: center; backdrop-filter: blur(10px); transition: 0.3s; position: relative; }
        
        /* 전설 카드: 황금빛 아우라 애니메이션 */
        @keyframes goldShimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .legend-card { background: linear-gradient(110deg, #1a1a2e 30%, #facc15 45%, #fbbf24 50%, #facc15 55%, #1a1a2e 70%) !important; background-size: 200% 100% !important; animation: goldShimmer 3s infinite linear; border: 2px solid #facc15 !important; box-shadow: 0 0 30px rgba(250, 204, 21, 0.4) !important; }
        
        .char-img { width: 100%; border-radius: 12px; margin-bottom: 15px; border: 2px solid #444; aspect-ratio: 1/1; object-fit: cover; }
    </style>
</head>
<body>

    <div id="authSection">
        <h1>⚔️ 전설의 시작</h1>
        <input type="email" id="emailInput" placeholder="이메일 주소">
        <input type="password" id="passwordInput" placeholder="비밀번호">
        <button onclick="handleLogin()">🚀 전장 입장</button>
        <button class="secondary-btn" onclick="handleSignup()">📝 새로운 용사 가입</button>
        <div id="authMessage" style="color: #ff4757; text-align: center; margin-top: 10px;"></div>
    </div>

    <div id="gameSection" style="display: none;">
        <div style="background: rgba(236, 72, 153, 0.05); padding: 30px; border-radius: 20px; border: 1px solid rgba(236, 72, 153, 0.2); margin-bottom: 40px;">
            <h2>🏆 명예의 전당</h2>
            <div id="hallOfFame" style="display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;"></div>
        </div>

        <div style="text-align: right; margin-bottom: 20px;">
            <span id="currentUserEmail" style="color: #aaa; margin-right: 15px; font-size: 14px;"></span>
            <button class="secondary-btn" onclick="handleLogout()" style="width: auto; padding: 8px 15px; font-size: 12px;">로그아웃</button>
        </div>

        <div style="text-align: center; margin-bottom: 40px;">
            <a href="/create.html" style="display: inline-block; padding: 18px 36px; background: linear-gradient(135deg, #ec4899, #ef4444); color: white; text-decoration: none; border-radius: 15px; font-size: 18px; font-weight: 800; box-shadow: 0 10px 20px rgba(236, 72, 153, 0.3); transition: 0.3s;">
                ➕ 새로운 전사 소환하기
            </a>
        </div>

        <hr style="border: 0; border-top: 1px solid #333; margin: 40px 0;">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0;">🛡️ 참전 용사 군단</h2>
            <div style="display: flex; align-items: center; gap: 10px;">
                <label for="myFilter" style="color: #94a3b8; font-size: 14px; cursor: pointer;">나의 전사만 보기</label>
                <input type="checkbox" id="myFilter" onchange="loadCharacters()" style="width: 18px; height: 18px; cursor: pointer; accent-color: #ec4899; margin:0;">
            </div>
        </div>

        <button onclick="startRandomBattle()" class="secondary-btn" style="background: #1e1e2f; border: 1px solid #ff4757; color: #ff4757;">🔥 무작위 난투 시작! 🔥</button>
        
        <div id="battleArena" style="display:none; margin-top:30px;"></div>
        <div id="characterList">용사들을 불러오는 중...</div>
    </div>

    <script>
        // Supabase 설정 (본인의 정보로 유지)
        const supabaseUrl = 'https://cjtshlrvuhhjmrlksohi.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqdHNobHJ2dWhoam1ybGtzb2hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MTc3MzEsImV4cCI6MjA4ODA5MzczMX0.ANiPuMSvCW7C8ybJNXU1BhpG1tO18VKGYbxXUrfWVKM'; 
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        // 인증 상태 감시
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (session) {
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('gameSection').style.display = 'block';
                document.getElementById('currentUserEmail').innerText = '접속자: ' + session.user.email;
                loadCharacters();
            } else {
                document.getElementById('authSection').style.display = 'block';
                document.getElementById('gameSection').style.display = 'none';
            }
        });

        // 칭호 부여 로직
        function getTitleBadge(streak) {
            if (streak >= 50) return '<span style="color: #facc15;">👑 전설</span> ';
            if (streak >= 30) return '<span style="color: #c084fc;">⚔️ 파괴왕</span> ';
            if (streak >= 5) return '<span style="color: #60a5fa;">🔥 도전자</span> ';
            return '<span style="color: #4ade80;">🌱 훈련병</span> ';
        }

        // 캐릭터 목록 로드 (이미지 & 성장 포인트 포함)
        async function loadCharacters() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            const myId = session ? session.user.id : null;
            const response = await fetch('/api/characters');
            let characters = await response.json();

            const isMyOnly = document.getElementById('myFilter').checked;
            if (isMyOnly && myId) {
                characters = characters.filter(char => char.owner_id === myId);
                listDiv.innerHTML += `
    <div class="${cardClass}">
        <img src="${char.image_url}" class="char-img">
        <h3>${getTitleBadge(streak)}${char.player_name}</h3>
        
        <div style="background:rgba(0,0,0,0.3); border-radius:8px; padding:5px; margin:10px 0; font-size:13px; color:#facc15;">
            ⚔️ ${char.matches || 0}전 ${char.wins || 0}승 (연승: ${streak})
        </div>

        <div style="margin:10px 0; background:#222; border-radius:20px; padding:5px; border:1px solid #444;">
            <div style="font-size:11px; color:#aaa; display:flex; justify-content:space-between; margin-bottom:3px;">
                <span>Lv.${Math.floor(gp / 10)}</span>
                <span>${gp} EP</span>
            </div>
            <div style="background:#111; height:8px; border-radius:4px; overflow:hidden;">
                <div style="background:linear-gradient(90deg, #4f46e5, #10b981); width:${Math.min(gp, 100)}%; height:100%;"></div>
            </div>
        </div>
        
        <p style="font-size:13px; color:#94a3b8;">능력: ${isOwner ? char.ability : '비공개'}</p>
        ${buttons}
    </div>
`;
            }

            // 명예의 전당 업데이트
            const top3 = [...characters].sort((a,b) => (b.win_streak || 0) - (a.win_streak || 0)).slice(0,3);
            const hallOfFame = document.getElementById('hallOfFame');
            hallOfFame.innerHTML = top3.length > 0 && top3[0].win_streak > 0 ? '' : '<p style="color:#666;">아직 기록이 없습니다.</p>';
            top3.forEach((char, i) => {
                if (char.win_streak > 0) {
                    hallOfFame.innerHTML += `
                        <div style="text-align:center; flex:1; background:rgba(0,0,0,0.2); padding:15px; border-radius:15px; min-width:120px;">
                            <div style="font-size:20px;">${['🥇','🥈','🥉'][i]}</div>
                            <div><strong>${char.player_name}</strong></div>
                            <div style="color:#ec4899; font-weight:bold;">${char.win_streak}연승</div>
                        </div>`;
                }
            });

            // 카드 리스트 업데이트
            const listDiv = document.getElementById('characterList');
            listDiv.innerHTML = '';
            characters.forEach(char => {
                const gp = char.growth_points || 0;
                const streak = char.win_streak || 0;
                const isOwner = myId === char.owner_id;
                
                // 전설 등급 판정: 50연승 또는 100포인트
                const cardClass = (streak >= 50 || gp >= 100) ? 'char-card legend-card' : 'char-card';
                
                const buttons = isOwner ? `
                    <button onclick="startChallenge(${char.id})" style="background:linear-gradient(135deg, #3b82f6, #8b5cf6); margin-top:10px; font-size:14px;">⚔️ 출격하기</button>
                    <button onclick="deleteCharacter(${char.id})" class="secondary-btn" style="font-size:12px; margin-top:5px;">🗑️ 은퇴 (삭제)</button>
                ` : '';

                listDiv.innerHTML += `
                    <div class="${cardClass}">
                        <img src="${char.image_url || 'https://pollinations.ai/p/fantasy-warrior?width=512&height=512'}" class="char-img" alt="Warrior">
                        <h3>${getTitleBadge(streak)}${char.player_name}</h3>
                        
                        <div style="margin:15px 0; background:#222; border-radius:20px; padding:5px; border:1px solid #444;">
                            <div style="font-size:11px; color:#aaa; display:flex; justify-content:space-between; margin-bottom:3px; padding:0 5px;">
                                <span>Lv.${Math.floor(gp / 10)}</span>
                                <span>${gp} EP</span>
                            </div>
                            <div style="background:#111; height:8px; border-radius:4px; overflow:hidden;">
                                <div style="background:linear-gradient(90deg, #4f46e5, #10b981); width:${Math.min(gp, 100)}%; height:100%; transition:width 0.5s;"></div>
                            </div>
                        </div>

                        <p style="font-size:13px; color:#94a3b8; margin:5px 0;">능력: ${isOwner ? char.ability : '비공개'}</p>
                        <div style="font-size:12px; color:#666;">🔥 현재 ${streak}연승 중</div>
                        ${buttons}
                    </div>
                `;
            });
        }

        // 배틀 로직 및 타이핑 효과
        async function startRandomBattle() {
            const arena = document.getElementById('battleArena');
            arena.style.display = 'block';
            arena.innerHTML = '<h3>⏳ AI 심판이 전장을 조성 중입니다...</h3>';
            arena.scrollIntoView({ behavior: 'smooth' });
            const response = await fetch('/api/battle/random');
            const result = await response.json();
            typeWriterEffect(result);
        }

        async function startChallenge(id) {
            const arena = document.getElementById('battleArena');
            arena.style.display = 'block';
            arena.scrollIntoView({ behavior: 'smooth' });
            arena.innerHTML = '<h3>🚀 도전장을 수락했습니다! 대결을 준비합니다...</h3>';
            const response = await fetch(`/api/battle/challenge/${id}`);
            const result = await response.json();
            typeWriterEffect(result);
        }

        function typeWriterEffect(result) {
            const arena = document.getElementById('battleArena');
            arena.innerHTML = `<h2 style="color:#ec4899;">⚔️ ${result.playerA} VS ${result.playerB}</h2><div id="typewriter" style="font-size:16px; line-height:1.8; color:#cbd5e1;"></div>`;
            const box = document.getElementById('typewriter');
            let i = 0;
            const story = result.story || "전투 기록을 불러올 수 없습니다.";
            function type() {
                if (i < story.length) {
                    box.innerHTML += story.charAt(i) === '\n' ? '<br>' : story.charAt(i);
                    i++;
                    setTimeout(type, 15);
                } else { loadCharacters(); }
            }
            type();
        }

        // 인증 처리 함수들
        async function handleSignup() {
            const { error } = await supabaseClient.auth.signUp({ email: emailInput.value, password: passwordInput.value });
            authMessage.innerText = error ? '오류: ' + error.message : '이메일 확인 후 로그인해 주세요!';
        }
        async function handleLogin() {
            const { error } = await supabaseClient.auth.signInWithPassword({ email: emailInput.value, password: passwordInput.value });
            if (error) authMessage.innerText = '로그인 실패: 정보를 확인하세요.';
        }
        async function handleLogout() { await supabaseClient.auth.signOut(); }
        async function deleteCharacter(id) {
            if (confirm("정말로 이 용사를 은퇴시키겠습니까? 모든 전적이 사라집니다.")) {
                await fetch(`/api/characters/${id}`, { method: 'DELETE' });
                loadCharacters();
            }
        }
    </script>
</body>
</html>
