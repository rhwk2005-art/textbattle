<!DOCTYPE html>
<html lang="ko">
<head>
    <style>
    /* 1. 기본 배경 및 폰트 설정 */
    :root {
        --bg-color: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.7);
        --accent-blue: #3b82f6;
        --accent-purple: #8b5cf6;
        --accent-gold: #facc15;
        --text-main: #f8fafc;
        --neon-glow: 0 0 15px rgba(59, 130, 246, 0.5);
    }

    body {
        background: radial-gradient(circle at top, #1e293b, #0f172a);
        color: var(--text-main);
        font-family: 'Pretendard', -apple-system, sans-serif;
        margin: 0; padding: 0;
        min-height: 100vh;
        letter-spacing: -0.5px;
    }

    /* 2. 로그인 및 컨테이너 공통 */
    .container {
        max-width: 1200px; margin: 0 auto; padding: 20px;
    }

    /* 유리 질감 카드 공통 스타일 */
    .glass-panel {
        background: var(--card-bg);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    /* 3. 입력창 및 버튼 (모바일 게임 감성) */
    input {
        width: 100%; padding: 12px; margin: 10px 0;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid #334155; border-radius: 10px;
        color: white; font-size: 16px; transition: 0.3s;
    }

    input:focus {
        border-color: var(--accent-blue);
        box-shadow: var(--neon-glow);
        outline: none;
    }

    button {
        cursor: pointer; border: none; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        text-transform: uppercase; letter-spacing: 1px;
    }

    button:active { transform: scale(0.95); }

    .primary-btn {
        background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
        color: white; font-weight: bold; border-radius: 12px;
        box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
    }

    .primary-btn:hover {
        box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
        filter: brightness(1.1);
    }

    /* 4. 캐릭터 카드 정밀 교정 */
    .char-card {
        background: var(--card-bg);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 24px; padding: 15px;
        transition: 0.3s; position: relative; overflow: hidden;
    }

    .char-card:hover {
        transform: translateY(-8px);
        border-color: var(--accent-blue);
        box-shadow: var(--neon-glow);
    }

    .char-img {
        border-radius: 18px; width: 100%; aspect-ratio: 1;
        object-fit: cover; border: 2px solid rgba(255, 255, 255, 0.1);
    }

    /* 전설 카드 특별 효과 */
    .legend-card {
        border: 2px solid var(--accent-gold);
        box-shadow: 0 0 20px rgba(250, 204, 21, 0.3);
    }

    .legend-card::after {
        content: 'LEGENDARY'; position: absolute; top: 10px; right: -30px;
        background: var(--accent-gold); color: black; font-size: 10px;
        font-weight: bold; padding: 5px 40px; transform: rotate(45deg);
    }

    /* 5. 배틀 아레나 (전광판 느낌) */
    #battleArena {
        background: #000; border: 2px solid #334155;
        border-radius: 15px; padding: 20px; margin-top: 30px;
        box-shadow: inset 0 0 30px rgba(59, 130, 246, 0.2);
    }

    h1, h2, h3 { color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
</style>
    <meta charset="UTF-8">
    <title>AI 텍스트 배틀: 전설의 서막</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container"> <div id="authSection" class="glass-panel" style="max-width: 400px; margin: 100px auto; text-align: center;">
            <h1 style="font-size: 28px; margin-bottom: 30px;">⚔️ 초능력 대전 ⚔️</h1>
            <input type="email" id="emailInput" placeholder="이메일 주소">
            <input type="password" id="passwordInput" placeholder="비밀번호">
            
            <button class="primary-btn" onclick="handleLogin()" style="width: 100%; padding: 15px; margin-top: 20px; font-size: 16px;">🚀 로그인</button>
            <button class="secondary-btn" onclick="handleSignup()" style="background: none; border: 1px solid #475569; color: #94a3b8; width: 100%; padding: 12px; margin-top: 10px; border-radius: 12px; font-size: 14px;">📝 회원 가입</button>
            
            <div id="authMessage" style="color: #ff4757; font-size: 13px; margin-top: 15px;"></div>
        </div>

        <div id="gameSection" style="display: none;">
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <span id="currentUserEmail" style="color: #94a3b8; font-weight: 500;"></span>
                <button onclick="handleLogout()" style="background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; padding: 5px 15px; border-radius: 8px; font-size: 12px;">로그아웃</button>
            </div>

            <div class="glass-panel" style="padding: 20px; margin-bottom: 40px; border-color: rgba(236, 72, 153, 0.3);">
                <h2 style="margin-top: 0; font-size: 20px; color: #ec4899;">🏆 명예의 전당</h2>
                <div id="hallOfFame" style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;"></div>
            </div>

            <div style="text-align: center; margin-bottom: 50px;">
                <a href="/create.html" class="primary-btn" style="display: inline-block; padding: 20px 40px; text-decoration: none; font-size: 20px; border-radius: 15px;">
                    ➕ 캐릭터 생성
                </a>
            </div>

            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.05); margin: 40px 0;">
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <h2 style="margin: 0; font-size: 22px;">👨‍👩‍👧‍👦 현재 인구</h2>
                <div style="display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.2); padding: 8px 15px; border-radius: 10px;">
                    <label for="myFilter" style="color: #94a3b8; font-size: 15px; cursor: pointer;">내 캐릭터만 보기</label>
                    <input type="checkbox" id="myFilter" onchange="loadCharacters()" style="width: 16px; height: 16px; accent-color: #ec4899;">
                </div>
            </div>

            <button onclick="startRandomBattle()" class="primary-btn" style="width: 100%; background: linear-gradient(135deg, #ef4444, #f59e0b); margin-bottom: 30px; padding: 15px; font-size: 18px;">🔥 무작위 난투 시작! 🔥</button>

            <div id="battleArena" style="display:none; margin-bottom: 40px;"></div>

            <div id="characterList">용사들을 불러오는 중...</div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
