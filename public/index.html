<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 텍스트 배틀 게임</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 1. 최신 트렌드 폰트 'Pretendard' 적용 (토스, 애플 등에서 사용하는 깔끔한 서체) */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        /* 2. 심연의 우주 같은 신비로운 오로라 배경 */
        body { 
            background: radial-gradient(circle at 15% 50%, #1a1a2e, #0f0f1a, #050505); 
            color: #f1f5f9; 
            font-family: 'Pretendard', sans-serif; 
            max-width: 850px; 
            margin: 0 auto; 
            padding: 50px 20px; 
            line-height: 1.6;
        }

        /* 3. 그라데이션 텍스트 (세련된 포인트 컬러) */
        h1, h2 { 
            text-align: center; 
            background: linear-gradient(135deg, #a855f7, #ec4899, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 30px; 
        }

        /* 4. 글래스모피즘 (반투명 유리 패널 효과) */
        #authSection, #gameSection > form, #battleArena {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        /* 5. 깔끔한 입력창 */
        input[type="text"], input[type="email"], input[type="password"] { 
            width: 100%; 
            padding: 16px; 
            margin: 8px 0 24px; 
            background-color: rgba(0, 0, 0, 0.2); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            color: white; 
            border-radius: 12px; 
            font-size: 16px; 
            outline: none;
            transition: border 0.3s ease;
        }
        input:focus { border-color: #ec4899; } /* 클릭 시 핑크색 테두리 */

        /* 6. 모던한 버튼 디자인 */
        button { 
            width: 100%; 
            padding: 16px; 
            margin-bottom: 12px; 
            font-size: 18px; 
            font-weight: 700; 
            background: linear-gradient(135deg, #ec4899, #ef4444);
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        button:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 10px 25px rgba(236, 72, 153, 0.4); 
        }
        
        /* 보조 버튼 (회색) */
        .secondary-btn { background: rgba(255, 255, 255, 0.1); box-shadow: none; }
        .secondary-btn:hover { background: rgba(255, 255, 255, 0.2); box-shadow: none; }

        /* 7. 벤토 박스 (Bento Box) 스타일의 캐릭터 명부 */
        #characterList { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 20px; 
            margin-top: 20px; 
        }
        .char-card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            padding: 24px; 
            border-radius: 20px; 
            text-align: center; 
            backdrop-filter: blur(10px);
            transition: all 0.3s ease; 
        }
        .char-card:hover { 
            transform: translateY(-8px); 
            border-color: #a855f7; 
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <div id="authSection">
        <h1>입장소 (로그인)</h1>
        <p style="text-align: center; color: #ccc;">전장에 참여하려면 신분을 증명하십시오.</p>
        <input type="email" id="emailInput" placeholder="이메일 주소">
        <input type="password" id="passwordInput" placeholder="비밀번호 (6자리 이상)">
        <button onclick="handleLogin()">🚀 로그인</button>
        <button class="secondary-btn" onclick="handleSignup()">📝 새로 가입하기</button>
        <div id="authMessage" style="color: #ff4757; text-align: center; margin-top: 10px;"></div>
    </div>

    <div id="gameSection" style="display: none;">
        <div style="text-align: right;">
            <span id="currentUserEmail" style="color: #aaa; margin-right: 15px;"></span>
            <button class="secondary-btn" onclick="handleLogout()" style="width: auto; padding: 8px 15px; font-size: 14px;">로그아웃</button>
        </div>
        <h1>⚔️ 나만의 전사 만들기</h1>
        <form action="/battle" method="POST">
            <input type="hidden" id="ownerIdInput" name="ownerId">
            <label>캐릭터 이름</label>
            <input type="text" name="playerName" required placeholder="예: 어둠의 암살자">
            <label>특수 능력</label>
            <input type="text" name="ability" required placeholder="예: 그림자 속에 숨어 치명타를 가함">
            <button type="submit">전사 등록하기</button>
        </form>
        <hr style="border-color: #333; margin: 40px 0;">
        <h2>⚔️ 랜덤 텍스트 배틀</h2>
        <button onclick="startRandomBattle()">🔥 랜덤 배틀 시작! 🔥</button>
        <div id="battleArena">결과가 이곳에 표시됩니다.</div>
        <hr style="border-color: #333; margin: 40px 0;">
        <h2>🏆 현재 등록된 참전 용사들</h2>
        <div id="characterList">데이터를 불러오는 중...</div>
    </div>

    <script>
        const supabaseUrl = 'https://cjtshlrvuhhjmrlksohi.supabase.co'; // ⭐️ 본인 URL 입력
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqdHNobHJ2dWhoam1ybGtzb2hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MTc3MzEsImV4cCI6MjA4ODA5MzczMX0.ANiPuMSvCW7C8ybJNXU1BhpG1tO18VKGYbxXUrfWVKM'; // ⭐️ 본인 Key 입력
        
        // 🟢 이름표 충돌을 막기 위해 supabase -> supabaseClient 로 이름을 바꿨습니다!
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        const authSection = document.getElementById('authSection');
        const gameSection = document.getElementById('gameSection');
        const authMessage = document.getElementById('authMessage');

        // 모든 통신 명령어에 supabaseClient 를 사용합니다.
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (session) {
                authSection.style.display = 'none';
                gameSection.style.display = 'block';
                document.getElementById('currentUserEmail').innerText = '접속자: ' + session.user.email;
                document.getElementById('ownerIdInput').value = session.user.id;
                loadCharacters();
            } else {
                authSection.style.display = 'block';
                gameSection.style.display = 'none';
            }
        });

        async function handleSignup() {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            const { data, error } = await supabaseClient.auth.signUp({ email, password });
            if (error) authMessage.innerText = '가입 에러: ' + error.message;
            else authMessage.innerText = '가입 성공! 이제 로그인 버튼을 눌러주세요.';
        }

        async function handleLogin() {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) authMessage.innerText = '로그인 실패. 아이디나 비밀번호를 확인하세요.';
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
        }

        async function startRandomBattle() {
            const arena = document.getElementById('battleArena');
            arena.style.display = 'block';
            arena.innerHTML = '<h3>⏳ 매칭 중... AI 심판이 승패를 분석하고 있습니다!</h3>';
            try {
                const response = await fetch('/api/battle/random');
                if (!response.ok) {
                    const errorText = await response.text();
                    arena.innerHTML = `<h3 style="color:#ff4757;">❌ ${errorText}</h3>`;
                    return;
                }
                const result = await response.json();
                const formattedStory = result.story.replace(/\n/g, '<br>');
                arena.innerHTML = `
                    <h2 style="color: #ff4757;">⚔️ ${result.playerA} VS ${result.playerB} ⚔️</h2>
                    <div style="font-size: 16px; line-height: 1.6; background-color: #1e1e2f; padding: 15px; border-radius: 8px;">
                        ${formattedStory}
                    </div>
                `;
            } catch (error) {
                arena.innerHTML = '<h3 style="color:#ff4757;">통신 오류가 발생했습니다.</h3>';
            }
        }

        // [수정됨] 캐릭터 명부 불러오기 (능력치 비공개 기능 추가)
        async function loadCharacters() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            const myId = session ? session.user.id : null;

            const response = await fetch('/api/characters');
            const characters = await response.json();
            const listDiv = document.getElementById('characterList');
            listDiv.innerHTML = '';

            characters.forEach(char => {
                
                let deleteBtn = '';
                let displayAbility = '<span style="color: #ff4757;">??? (비공개)</span>'; // 🟢 기본값: 남의 것은 무조건 가림

                // 🟢 검사: 이 캐릭터의 주인이 '나'라면?
                if (myId === char.owner_id) {
                    displayAbility = char.ability; // 진짜 능력을 보여줌
                    deleteBtn = `<button onclick="deleteCharacter(${char.id})" style="background-color:#555; padding:8px; font-size:14px; margin-top:10px; width:100%;">🗑️ 내 전사 은퇴시키기</button>`;
                }

                // 화면에 그려질 캐릭터 카드 HTML
                const charCard = `
                    <div class="char-card">
                        <h3 style="color:#ff4757; margin-top:0;">👤 ${char.player_name}</h3>
                        <p style="font-size:14px; color:#ccc;"><strong>능력:</strong> ${displayAbility}</p>
                        ${deleteBtn}
                    </div>
                `;
                listDiv.innerHTML += charCard;
            });
        }

        // 🟢 [새로 추가됨] 삭제 버튼을 눌렀을 때 실행되는 기능
        async function deleteCharacter(charId) {
            // 실수로 누를 수 있으니 한 번 더 물어보기
            if (!confirm("정말 이 전사를 은퇴시키겠습니까? 복구할 수 없습니다!")) return;

            // 서버의 파쇄기(DELETE)로 삭제 요청 보내기
            await fetch(`/api/characters/${charId}`, { method: 'DELETE' });
            
            // 삭제가 끝났으면 화면을 새로고침해서 명부 다시 그리기
            loadCharacters(); 
        }
    </script>
</body>
</html>
