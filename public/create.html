<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>전사 등록 - AI 텍스트 배틀</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { background: radial-gradient(circle at 15% 50%, #1a1a2e, #0f0f1a, #050505); color: #f1f5f9; font-family: 'Pretendard', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .create-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); border-radius: 30px; padding: 50px; width: 100%; max-width: 450px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); text-align: center; }
        h1 { background: linear-gradient(135deg, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 32px; margin-bottom: 30px; }
        input { width: 100%; padding: 16px; margin-bottom: 20px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 18px; background: linear-gradient(135deg, #ec4899, #ef4444); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(236, 72, 153, 0.4); }
        .back-link { display: block; margin-top: 20px; color: #94a3b8; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="create-card">
        <h1>⚔️ 새로운 전사 등록</h1>
        <form action="/battle" method="POST">
            <input type="hidden" id="ownerIdInput" name="ownerId">
            <input type="text" name="playerName" required placeholder="전사의 이름을 입력하세요">
            <input type="text" name="ability" required placeholder="특수 능력을 입력하세요">
            <button type="submit">전장으로 소환하기</button>
        </form>
        <a href="/" class="back-link">← 전장으로 돌아가기</a>
    </div>

    <script>
        const supabaseUrl = 'https://cjtshlrvuhhjmrlksohi.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqdHNobHJ2dWhoam1ybGtzb2hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MTc3MzEsImV4cCI6MjA4ODA5MzczMX0.ANiPuMSvCW7C8ybJNXU1BhpG1tO18VKGYbxXUrfWVKM';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        // 현재 로그인한 사람의 ID를 폼에 넣어줍니다.
        supabaseClient.auth.getSession().then(({ data: { session } }) => {
            if (!session) { alert("로그인이 필요합니다!"); location.href = "/"; }
            else { document.getElementById('ownerIdInput').value = session.user.id; }
        });
    </script>
</body>
</html>
