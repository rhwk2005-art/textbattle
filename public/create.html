<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새로운 전사 소환 - AI 텍스트 배틀</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        /* 🟢 메인 로비와 완벽하게 동일한 색상 변수 적용 */
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --text-main: #f8fafc;
            --neon-glow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        body { 
            background: radial-gradient(circle at top, #1e293b, #0f172a); 
            color: var(--text-main); 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            letter-spacing: -0.5px;
        }

        /* 유리 질감 패널 */
        .create-card { 
            background: var(--card-bg); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(12px); 
            border-radius: 24px; 
            padding: 40px 30px; 
            width: 90%; 
            max-width: 420px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            text-align: center; 
            box-sizing: border-box;
        }

        h1 { font-size: 26px; margin-top: 0; margin-bottom: 5px; color: white; }
        
        .subtitle { color: #94a3b8; font-size: 13px; margin-bottom: 30px; line-height: 1.5; }

        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 13px; color: #cbd5e1; margin-bottom: 8px; font-weight: bold; }

        input { 
            width: 100%; padding: 14px; background: rgba(0,0,0,0.3); 
            border: 1px solid #334155; border-radius: 12px; color: white; 
            font-size: 16px; box-sizing: border-box; transition: 0.3s;
        }

        input:focus { border-color: var(--accent-blue); box-shadow: var(--neon-glow); outline: none; }

        button { 
            width: 100%; padding: 16px; 
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); 
            color: white; border: none; border-radius: 12px; font-size: 18px; 
            font-weight: bold; cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 10px; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        button:hover { box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6); filter: brightness(1.1); }
        button:active { transform: scale(0.95); }
        button:disabled { background: #475569; box-shadow: none; cursor: not-allowed; transform: none; filter: none; color: #94a3b8; }

        .back-link { display: inline-block; margin-top: 25px; color: #64748b; text-decoration: none; font-size: 14px; transition: 0.2s; }
        .back-link:hover { color: white; }
    </style>
</head>
<body>
    <div class="create-card">
        <h1>🧬 영웅 배양 캡슐</h1>
        <p class="subtitle">AI가 전사의 초상화를 실시간으로 그려냅니다.<br>(이미지 생성에 약 10~20초가 소요됩니다)</p>
        
        <form action="/battle" method="POST" onsubmit="disableButton()">
            <input type="hidden" id="ownerIdInput" name="ownerId">
            
            <div class="input-group">
                <label for="playerName">전사 명칭</label>
                <input type="text" id="playerName" name="playerName" required placeholder="예: Boxing Kangaroo (영어 추천)">
            </div>

            <div class="input-group">
                <label for="ability">특수 능력</label>
                <input type="text" id="ability" name="ability" required placeholder="예: wearing red boxing gloves">
            </div>

            <button type="submit" id="submitBtn">전장으로 소환하기</button>
        </form>
        <a href="/" class="back-link">← 전장으로 돌아가기</a>
    </div>

    <script>
        const supabaseUrl = 'https://cjtshlrvuhhjmrlksohi.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqdHNobHJ2dWhoam1ybGtzb2hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MTc3MzEsImV4cCI6MjA4ODA5MzczMX0.ANiPuMSvCW7C8ybJNXU1BhpG1tO18VKGYbxXUrfWVKM';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        supabaseClient.auth.getSession().then(({ data: { session } }) => {
            if (!session) { alert("로그인이 필요합니다!"); location.href = "/"; }
            else { document.getElementById('ownerIdInput').value = session.user.id; }
        });

        // 🟢 [핵심 UX 개선] 소환 버튼을 누르면 버튼이 비활성화되며 로딩 상태로 바뀝니다.
        function disableButton() {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '⏳ 마법진 가동 중... (기다려주세요)';
        }
    </script>
</body>
</html>
