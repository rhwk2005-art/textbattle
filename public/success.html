<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>소환 성공! - AI 텍스트 배틀</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { background: #050505; color: white; font-family: 'Pretendard', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .success-box { text-align: center; animation: fadeInUp 0.8s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .crown { font-size: 80px; margin-bottom: 20px; display: block; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        h1 { font-size: 40px; margin: 0; background: linear-gradient(135deg, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .desc { color: #94a3b8; margin: 20px 0 40px; font-size: 18px; }
        .card-preview { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; border: 1px solid #fbbf24; margin-bottom: 40px; }
        .btn { padding: 18px 40px; background: white; color: black; text-decoration: none; border-radius: 50px; font-weight: 800; font-size: 18px; transition: 0.3s; }
        .btn:hover { background: #fbbf24; transform: scale(1.1); }
    </style>
</head>
<body>
    <div class="success-box">
        <span class="crown">👑</span>
        <h1>전사 소환 성공!</h1>
        <p class="desc">새로운 용사가 전장에 이름을 올렸습니다.</p>
        
        <div class="card-preview">
            <h2 id="viewName" style="margin:0; color:#fbbf24;"></h2>
            <p id="viewAbility" style="color:#ccc; margin-top:10px;"></p>
        </div>

        <a href="/" class="btn">명부 확인하러 가기</a>
    </div>

    <script>
        // 주소창에서 이름과 능력을 읽어와서 화면에 보여줍니다.
        const params = new URLSearchParams(window.location.search);
        document.getElementById('viewName').innerText = params.get('name');
        document.getElementById('viewAbility').innerText = "능력: " + params.get('ability');
    </script>
</body>
</html>
